<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">Debugging through meaning, bindings, search, and proof</title>
  <desc id="desc">A disputed ground question passes through four diagnostic lenses in order: clarify its meaning, trace bindings left to right, inspect search behavior, and examine successful proof premises before preserving the repair as a regression.</desc>
  <defs>
    <style>
      .paper{fill:#fffdf7;stroke:#243447;stroke-width:2}.green{fill:#dcefe8;stroke:#2f6f55;stroke-width:2}
      .gold{fill:#fff0d9;stroke:#9a5b18;stroke-width:2}.rose{fill:#f1dfdf;stroke:#8b3a3a;stroke-width:2}
      .blue{fill:#dcebf0;stroke:#526273;stroke-width:2}.title{fill:#8b3a3a;font:bold 24px Georgia,serif}
      .label{fill:#243447;font:bold 17px Georgia,serif}.prose{fill:#435166;font:15px Georgia,serif}
      .code{fill:#172334;font:14px ui-monospace,SFMono-Regular,Consolas,monospace}.line{fill:none;stroke:#526273;stroke-width:2.5}
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#526273"/></marker>
  </defs>
  <rect width="900" height="500" fill="#f4efe3"/>
  <text class="title" x="450" y="35" text-anchor="middle">DEBUG THROUGH FOUR LENSES</text>
  <rect class="paper" x="275" y="60" width="350" height="65" rx="10"/>
  <text class="label" x="450" y="86" text-anchor="middle">SMALLEST DISPUTED GROUND QUESTION</text>
  <text class="code" x="450" y="110" text-anchor="middle">query(eligible(alex)).</text>
  <path class="line" marker-end="url(#arrow)" d="M450 125V155"/>

  <rect class="blue" x="25" y="165" width="195" height="135" rx="10"/>
  <text class="label" x="122" y="194" text-anchor="middle">1 · MEANING</text>
  <text class="prose" x="122" y="225" text-anchor="middle">What should this</text>
  <text class="prose" x="122" y="247" text-anchor="middle">ground sentence say?</text>
  <text class="code" x="122" y="278" text-anchor="middle">domain first</text>
  <rect class="gold" x="240" y="165" width="195" height="135" rx="10"/>
  <text class="label" x="337" y="194" text-anchor="middle">2 · BINDINGS</text>
  <text class="prose" x="337" y="225" text-anchor="middle">What is known</text>
  <text class="prose" x="337" y="247" text-anchor="middle">before each goal?</text>
  <text class="code" x="337" y="278" text-anchor="middle">binding ledger</text>
  <rect class="rose" x="455" y="165" width="195" height="135" rx="10"/>
  <text class="label" x="552" y="194" text-anchor="middle">3 · SEARCH</text>
  <text class="prose" x="552" y="225" text-anchor="middle">Which alternatives</text>
  <text class="prose" x="552" y="247" text-anchor="middle">repeat or fail?</text>
  <text class="code" x="552" y="278" text-anchor="middle">tree + --stats</text>
  <rect class="green" x="670" y="165" width="205" height="135" rx="10"/>
  <text class="label" x="772" y="194" text-anchor="middle">4 · PROOF</text>
  <text class="prose" x="772" y="225" text-anchor="middle">Which premises support</text>
  <text class="prose" x="772" y="247" text-anchor="middle">the surprising answer?</text>
  <text class="code" x="772" y="278" text-anchor="middle">--proof</text>
  <path class="line" marker-end="url(#arrow)" d="M220 232H233M435 232H448M650 232H663"/>

  <path class="line" marker-end="url(#arrow)" d="M772 300C772 350 650 355 610 372"/>
  <rect class="paper" x="205" y="365" width="490" height="100" rx="10"/>
  <text class="label" x="450" y="395" text-anchor="middle">PRESERVE WHAT THE FAILURE TAUGHT</text>
  <text class="prose" x="450" y="425" text-anchor="middle">repair one invariant, then leave a regression, fuse, mode test,</text>
  <text class="prose" x="450" y="449" text-anchor="middle">bounded property, proof golden, or explanatory comment</text>
  <text class="prose" x="450" y="490" text-anchor="middle">Stop at the first lens that reveals the mismatch; later views answer different questions.</text>
</svg>
